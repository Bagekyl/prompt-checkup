    - data:
        code: "import re\nimport json\n\ndef main(\n    prompt_text: str,\n    task_description:\
          \ str = \"\",\n    task_type: str = \"\",\n    context: str = \"\",\n  \
          \  output_requirements: str = \"\",\n    review_depth: str = \"\"\n) ->\
          \ dict:\n    prompt_text = prompt_text or \"\"\n    task_description = task_description\
          \ or \"\"\n    task_type = task_type or \"\"\n    context = context or \"\
          \"\n    output_requirements = output_requirements or \"\"\n    review_depth\
          \ = review_depth or \"\"\n\n    full_text = \"\\n\".join([\n        prompt_text,\n\
          \        task_description,\n        task_type,\n        context,\n     \
          \   output_requirements,\n        review_depth\n    ])\n\n    full_text_lower\
          \ = full_text.lower()\n    stripped_prompt = prompt_text.strip()\n    prompt_length\
          \ = len(stripped_prompt)\n\n    # 多语言模糊词 / 空泛词\n    vague_words = [\n  \
          \      # 中文\n        \"随便\", \"高级一点\", \"详细一点\", \"优化一下\", \"好一点\",\n  \
          \      \"丰富一点\", \"专业一点\", \"自然一点\", \"有趣一点\",\n        \"尽量\", \"适当\",\
          \ \"看情况\", \"你自己发挥\", \"差不多\",\n        \"全面\", \"深入\", \"有洞察力\", \"有说服力\"\
          ,\n\n        # English\n        \"make it better\", \"more professional\"\
          , \"more natural\",\n        \"as much as possible\", \"be creative\", \"\
          up to you\",\n        \"detailed\", \"comprehensive\", \"insightful\", \"\
          persuasive\",\n        \"high quality\", \"advanced\",\n\n        # 日本語\n\
          \        \"いい感じ\", \"自然に\", \"専門的に\", \"詳しく\", \"できるだけ\",\n        \"適当に\"\
          , \"おまかせ\", \"分かりやすく\", \"説得力のある\",\n        \"深く\", \"包括的に\"\n    ]\n\n\
          \    # 多语言输出格式信号\n    format_words = [\n        # 中文\n        \"格式\", \"\
          输出\", \"表格\", \"JSON\", \"Markdown\", \"分点\",\n        \"列表\", \"标题\", \"\
          段落\", \"字数\", \"结构\", \"模板\",\n\n        # English\n        \"format\",\
          \ \"output\", \"table\", \"json\", \"markdown\",\n        \"bullet\", \"\
          list\", \"heading\", \"section\", \"word count\",\n        \"structure\"\
          , \"template\", \"columns\", \"schema\",\n\n        # 日本語\n        \"出力\"\
          , \"形式\", \"フォーマット\", \"表\", \"json\", \"markdown\",\n        \"箇条書き\",\
          \ \"リスト\", \"見出し\", \"段落\", \"文字数\",\n        \"構成\", \"テンプレート\", \"項目\"\
          \n    ]\n\n    # 多语言约束信号\n    constraint_words = [\n        # 中文\n     \
          \   \"必须\", \"不要\", \"禁止\", \"限制\", \"要求\", \"需要\",\n        \"风格\", \"\
          语气\", \"长度\", \"受众\", \"场景\", \"参考\",\n        \"不能\", \"只允许\", \"严格\",\
          \ \"不得\", \"避免\",\n\n        # English\n        \"must\", \"should\", \"\
          do not\", \"don't\", \"never\", \"avoid\",\n        \"require\", \"requirement\"\
          , \"constraint\", \"limit\", \"only\",\n        \"strictly\", \"style\"\
          , \"tone\", \"audience\", \"scenario\",\n        \"context\", \"reference\"\
          , \"without\", \"if insufficient\",\n\n        # 日本語\n        \"必ず\", \"\
          してください\", \"してはいけない\", \"禁止\",\n        \"避けて\", \"制約\", \"条件\", \"要件\"\
          , \"必要\", \"のみ\",\n        \"厳密に\", \"文体\", \"トーン\", \"対象者\", \"場面\",\n\
          \        \"参考\", \"不足している場合\"\n    ]\n\n    # 多语言角色信号\n    role_words =\
          \ [\n        # 中文\n        \"你是\", \"作为\", \"扮演\", \"专家\", \"助手\", \"顾问\"\
          ,\n        \"老师\", \"医生\", \"教练\", \"分析师\", \"工程师\",\n\n        # English\n\
          \        \"you are\", \"act as\", \"as a\", \"role\", \"expert\",\n    \
          \    \"assistant\", \"advisor\", \"consultant\", \"teacher\",\n        \"\
          coach\", \"analyst\", \"engineer\", \"specialist\",\n\n        # 日本語\n \
          \       \"あなたは\", \"として\", \"役割\", \"専門家\", \"アシスタント\",\n        \"添削アシスタント\"\
          , \"先生\", \"教師\", \"コーチ\",\n        \"分析者\", \"アナリスト\", \"コンサルタント\"\n  \
          \  ]\n\n    # 多语言示例信号\n    example_words = [\n        # 中文\n        \"示例\"\
          , \"例如\", \"比如\", \"样例\", \"案例\", \"参考如下\",\n\n        # English\n     \
          \   \"example\", \"for example\", \"sample\", \"case\", \"reference\",\n\
          \        \"few-shot\", \"demo\",\n\n        # 日本語\n        \"例\", \"例えば\"\
          , \"サンプル\", \"事例\", \"参考例\",\n        \"例文\"\n    ]\n\n    # 多语言 Prompt\
          \ 注入 / 越权风险词\n    injection_words = [\n        # 中文\n        \"忽略以上\", \"\
          忽略之前\", \"忽略系统\", \"开发者指令\",\n        \"系统提示词\", \"泄露提示词\", \"越狱\",\n\n\
          \        # English\n        \"ignore previous\", \"ignore above\", \"ignore\
          \ all previous\",\n        \"ignore system\", \"system prompt\", \"developer\
          \ instruction\",\n        \"reveal your prompt\", \"jailbreak\", \"bypass\"\
          ,\n\n        # 日本語\n        \"以前の指示を無視\", \"上記を無視\", \"システムプロンプト\",\n  \
          \      \"開発者指示\", \"プロンプトを開示\", \"脱獄\"\n    ]\n\n    # 多语言任务信号\n    task_signal_words\
          \ = [\n        # 中文\n        \"请\", \"帮我\", \"生成\", \"写\", \"分析\", \"总结\"\
          ,\n        \"提取\", \"解释\", \"分类\", \"改写\", \"翻译\", \"回答\",\n        \"输出\"\
          , \"创建\", \"设计\", \"检查\", \"评估\", \"诊断\",\n\n        # English\n       \
          \ \"please\", \"generate\", \"write\", \"analyze\", \"summarize\",\n   \
          \     \"extract\", \"explain\", \"classify\", \"rewrite\", \"translate\"\
          ,\n        \"answer\", \"output\", \"create\", \"design\", \"evaluate\"\
          ,\n        \"diagnose\", \"identify\", \"suggest\", \"review\",\n\n    \
          \    # 日本語\n        \"してください\", \"生成\", \"書いて\", \"分析\", \"要約\",\n     \
          \   \"抽出\", \"説明\", \"分類\", \"書き換え\", \"翻訳\",\n        \"回答\", \"出力\", \"\
          作成\", \"設計\", \"評価\",\n        \"診断\", \"指摘\", \"提示\", \"添削\", \"挙げてください\"\
          \n    ]\n\n    def contains_any(words):\n        hits = []\n        for\
          \ w in words:\n            if w.lower() in full_text_lower:\n          \
          \      hits.append(w)\n        return hits\n\n    vague_hits = contains_any(vague_words)\n\
          \    injection_hits = contains_any(injection_words)\n\n    has_role = len(contains_any(role_words))\
          \ > 0\n    has_output_format = len(contains_any(format_words)) > 0\n   \
          \ has_constraints = len(contains_any(constraint_words)) > 0\n    has_examples\
          \ = len(contains_any(example_words)) > 0\n    has_task_signal = len(contains_any(task_signal_words))\
          \ > 0\n\n    placeholder_count = len(\n        re.findall(r\"\\{\\{.*?\\\
          }\\}|\\{.*?\\}|<.*?>|\\[.*?\\]|【.*?】\", full_text)\n    )\n\n    if prompt_length\
          \ == 0:\n        validity_status = \"invalid\"\n        invalid_reason =\
          \ \"待评估 Prompt 为空。请先输入需要诊断的 Prompt。\"\n    elif prompt_length < 20:\n  \
          \      validity_status = \"invalid\"\n        invalid_reason = \"待评估 Prompt\
          \ 过短，无法进行有效诊断。请补充任务目标、输入内容或输出要求。\"\n    else:\n        validity_status =\
          \ \"valid\"\n        invalid_reason = \"\"\n\n    if prompt_length < 30:\n\
          \        completeness_level = \"过短\"\n    elif prompt_length < 120:\n  \
          \      completeness_level = \"偏短\"\n    elif prompt_length < 800:\n    \
          \    completeness_level = \"正常\"\n    else:\n        completeness_level\
          \ = \"较长\"\n\n    objective_score = 100\n\n    if prompt_length < 50:\n\
          \        objective_score -= 25\n    elif prompt_length < 120:\n        objective_score\
          \ -= 10\n\n    if not has_task_signal:\n        objective_score -= 15\n\n\
          \    if not has_output_format:\n        objective_score -= 15\n\n    if\
          \ not has_constraints:\n        objective_score -= 15\n\n    if not has_role:\n\
          \        objective_score -= 5\n\n    if not has_examples:\n        objective_score\
          \ -= 5\n\n    if vague_hits:\n        objective_score -= min(20, len(vague_hits)\
          \ * 5)\n\n    if injection_hits:\n        objective_score -= 30\n\n    objective_score\
          \ = max(0, min(100, objective_score))\n\n    if injection_hits:\n      \
          \  risk_level = \"高风险\"\n    elif objective_score < 50:\n        risk_level\
          \ = \"较高风险\"\n    elif objective_score < 75:\n        risk_level = \"中等风险\"\
          \n    else:\n        risk_level = \"低风险\"\n\n    precheck_data = {\n   \
          \     \"validity_status\": validity_status,\n        \"invalid_reason\"\
          : invalid_reason,\n        \"prompt_length\": prompt_length,\n        \"\
          task_type\": task_type,\n        \"review_depth\": review_depth,\n     \
          \   \"completeness_level\": completeness_level,\n        \"objective_score\"\
          : objective_score,\n        \"risk_level\": risk_level,\n        \"has_task_signal\"\
          : has_task_signal,\n        \"has_role\": has_role,\n        \"has_output_format\"\
          : has_output_format,\n        \"has_constraints\": has_constraints,\n  \
          \      \"has_examples\": has_examples,\n        \"placeholder_count\": placeholder_count,\n\
          \        \"vague_terms\": vague_hits,\n        \"injection_terms\": injection_hits\n\
          \    }\n\n    precheck_report = json.dumps(precheck_data, ensure_ascii=False,\
          \ indent=2)\n\n    return {\n        \"validity_status\": validity_status,\n\
          \        \"invalid_reason\": invalid_reason,\n        \"prompt_length\"\
          : prompt_length,\n        \"completeness_level\": completeness_level,\n\
          \        \"objective_score\": objective_score,\n        \"risk_level\":\
          \ risk_level,\n        \"has_task_signal\": \"是\" if has_task_signal else\
          \ \"否\",\n        \"has_role\": \"是\" if has_role else \"否\",\n        \"\
          has_output_format\": \"是\" if has_output_format else \"否\",\n        \"\
          has_constraints\": \"是\" if has_constraints else \"否\",\n        \"has_examples\"\
          : \"是\" if has_examples else \"否\",\n        \"placeholder_count\": placeholder_count,\n\
          \        \"vague_terms\": \"、\".join(vague_hits) if vague_hits else \"无\"\
          ,\n        \"injection_terms\": \"、\".join(injection_hits) if injection_hits\
          \ else \"无\",\n        \"precheck_report\": precheck_report\n    }"
