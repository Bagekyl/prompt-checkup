          \n    elif risk_severity == \"medium\":\n        risk_level = \"中等风险\"\n\
          \        if final_score >= 90:\n            final_score = 89\n         \
          \   risk_cap_applied = \"yes\"\n        if final_score >= 80:\n        \
          \    grade = \"良好\"\n        elif final_score >= 70:\n            grade\
          \ = \"可用\"\n        elif final_score >= 60:\n            grade = \"勉强可用\"\
          \n        else:\n            grade = \"需要重写\"\n    else:\n        # low\
          \ risk：正常按分数定级\n        if final_score >= 90:\n            grade = \"优秀\"\
          \n        elif final_score >= 80:\n            grade = \"良好\"\n        elif\
          \ final_score >= 70:\n            grade = \"可用\"\n        elif final_score\
          \ >= 60:\n            grade = \"勉强可用\"\n        else:\n            grade\
