          \    score_summary = (\n        f\"最终评分为 {final_score} 分，等级为「{grade}」。\"\
          \n        f\"语义诊断分为 {semantic_score} 分，结构预检分为 {round(objective_score_num)}\
          \ 分。\"\n        f\"风险严重程度为「{risk_severity}」，综合风险等级为「{risk_level}」。\"\n \
          \   )\n\n    if risk_cap_applied == \"yes\":\n        score_summary += \"\
          \ 由于检测到较高风险或严重风险，系统已对最终评分进行风险封顶。\"\n\n    main_issues = data.get(\"main_issues\"\
          , [])\n    missing_info = data.get(\"missing_info\", [])\n    optimized_prompt\
          \ = data.get(\"optimized_prompt\", \"\")\n    advanced_prompt = data.get(\"\
          advanced_prompt\", \"\")\n    risk_notes = data.get(\"risk_notes\", [])\n\
          \n    if isinstance(main_issues, str):\n        main_issues = [{\"issue\"\
          : \"主要问题\", \"impact\": main_issues, \"suggestion\": \"\"}]\n\n    if isinstance(missing_info,\
          \ str):\n        missing_info = [missing_info]\n\n    if isinstance(risk_notes,\
          \ str):\n        risk_notes = [risk_notes]\n\n    diagnosis_json = json.dumps(data,\
          \ ensure_ascii=False, indent=2)\n    main_issues_json = json.dumps(main_issues,\
          \ ensure_ascii=False, indent=2)\n    missing_info_json = json.dumps(missing_info,\
          \ ensure_ascii=False, indent=2)\n    risk_notes_json = json.dumps(risk_notes,\
          \ ensure_ascii=False, indent=2)\n\n    return {\n        \"final_score\"\
          : final_score,\n        \"semantic_score\": semantic_score,\n        \"\
          objective_score\": round(objective_score_num),\n        \"grade\": grade,\n\
