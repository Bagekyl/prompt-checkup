    - data:
        code: "import json\nimport re\n\ndef safe_number(value, default=70):\n   \
          \ try:\n        if isinstance(value, str):\n            value = value.strip()\n\
          \        num = float(value)\n        return max(0, min(100, num))\n    except\
          \ Exception:\n        return default\n\ndef normalize_risk_severity(value):\n\
          \    if not value:\n        return \"medium\"\n\n    value = str(value).strip().lower()\n\
          \n    allowed = {\"low\", \"medium\", \"high\", \"critical\"}\n    if value\
          \ in allowed:\n        return value\n\n    # 兼容模型偶尔输出中文，虽然我们已经告诉它别乱来。模型嘛，懂的。\n\
          \    mapping = {\n        \"低风险\": \"low\",\n        \"中等风险\": \"medium\"\
          ,\n        \"较高风险\": \"high\",\n        \"高风险\": \"high\",\n        \"严重高风险\"\
          : \"critical\",\n        \"极高风险\": \"critical\",\n        \"致命风险\": \"critical\"\
          \n    }\n\n    return mapping.get(value, \"medium\")\n\ndef extract_json(text):\n\
          \    if not text:\n        raise ValueError(\"diagnosis_text is empty\"\
          )\n\n    text = text.strip()\n\n    # 如果模型不听话，输出了 ```json ... ```，这里尝试剥掉代码块\n\
          \    code_block_match = re.search(r\"```(?:json)?\\s*(\\{.*?\\})\\s*```\"\
          , text, re.DOTALL)\n    if code_block_match:\n        text = code_block_match.group(1).strip()\n\
          \n    # 如果 JSON 前后混了废话，尝试截取第一个 { 到最后一个 }\n    start = text.find(\"{\")\n\
          \    end = text.rfind(\"}\")\n    if start != -1 and end != -1 and end >\
          \ start:\n        text = text[start:end + 1]\n\n    return json.loads(text)\n\
          \ndef main(\n    diagnosis_text: str,\n    objective_score: float = 70,\n\
          \    precheck_risk_level: str = \"中等风险\",\n    precheck_report: str = \"\
          \"\n) -> dict:\n    parse_status = \"success\"\n    parse_error = \"\"\n\
          \    risk_cap_applied = \"no\"\n\n    objective_score_num = safe_number(objective_score,\
          \ 70)\n\n    try:\n        data = extract_json(diagnosis_text)\n    except\
          \ Exception as e:\n        parse_status = \"failed\"\n        parse_error\
          \ = str(e)\n\n        # 解析失败时给一个保守兜底，避免整个 Flow 爆炸\n        data = {\n  \
          \          \"overall_assessment\": \"结构化诊断结果解析失败，无法读取完整诊断字段。\",\n      \
          \      \"clarity_score\": 60,\n            \"context_score\": 60,\n    \
          \        \"constraint_score\": 60,\n            \"output_score\": 60,\n\
          \            \"robustness_score\": 60,\n            \"risk_severity\": \"\
          high\",\n            \"main_issues\": [\n                {\n           \
          \         \"issue\": \"结构化输出解析失败\",\n                    \"impact\": \"\
          后续评分和报告可能不完整。\",\n                    \"suggestion\": \"请检查结构化诊断节点是否只输出合法\
          \ JSON。\"\n                }\n            ],\n            \"missing_info\"\
          : [],\n            \"rewrite_strategy\": \"请重新运行结构化诊断，并确保输出合法 JSON。\",\n\
          \            \"optimized_prompt\": \"\",\n            \"advanced_prompt\"\
          : \"\",\n            \"risk_notes\": [\"结构化诊断输出不是合法 JSON。\"]\n        }\n\
          \n    clarity = safe_number(data.get(\"clarity_score\"), 60)\n    context\
          \ = safe_number(data.get(\"context_score\"), 60)\n    constraint = safe_number(data.get(\"\
          constraint_score\"), 60)\n    output = safe_number(data.get(\"output_score\"\
          ), 60)\n    robustness = safe_number(data.get(\"robustness_score\"), 60)\n\
          \n    risk_severity = normalize_risk_severity(data.get(\"risk_severity\"\
          , \"medium\"))\n\n    # 语义评分：来自 LLM 诊断的五项评分\n    semantic_score = round(\n\
          \        clarity * 0.25 +\n        context * 0.15 +\n        constraint\
          \ * 0.20 +\n        output * 0.20 +\n        robustness * 0.20\n    )\n\n\
          \    # 基础最终分：语义诊断占 75%，结构预检占 25%\n    final_score = round(semantic_score\
          \ * 0.75 + objective_score_num * 0.25)\n\n    # 风险封顶机制：\n    # high / critical\
          \ 不允许靠“结构完整”把分数抬太高\n    if risk_severity == \"critical\":\n        final_score\
