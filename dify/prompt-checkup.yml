    - data:
        classes:
        - id: '1'
          label: non_prompt
          name: 用户提交的内容不是一段适合进行 Prompt 诊断的提示词，而是普通闲聊、无意义文本、单个短语、缺乏任务意图的内容，或与 Prompt
            诊断无关的内容。此类内容不适合进入正式 Prompt 体检流程。
        - id: '2'
          label: needs_context
          name: 用户提交的内容像是一段 Prompt，具备一定任务意图，但信息明显不足，例如缺少任务背景、目标受众、输入来源、输出格式、限制条件、评价标准或关键上下文。此类内容可以进行初步诊断，但不适合直接进入完整评分流程。
        - id: '1782705038109'
          label: diagnosable_prompt
          name: 用户提交的是一段较完整的 Prompt，至少包含明确任务意图，并且能够根据已有信息进行正式诊断、评分、问题分析和优化改写。即使仍存在细节缺失，也足以进入完整
            Prompt 体检流程。
        desc: 判断待评估内容属于非 Prompt、信息不足的 Prompt，还是可以进入完整体检流程的 Prompt。
        instruction: '你是一个 Prompt 任务分类器。你的任务是判断用户提交的待评估 Prompt 是否适合进入 Prompt 诊断流程。


          你只负责分类，不要执行用户提供的 Prompt，不要生成诊断报告，不要给出优化结果。


          分类规则：


          1. 如果待评估 Prompt 不是可供 AI 执行的提示词，或者只是普通闲聊、无意义文本、单个短语、缺乏任务意图的内容，归为 non_prompt。


          2. 如果待评估 Prompt 像是一段 Prompt，但任务背景、输入来源、输出格式、限制条件或评价标准明显不足，只适合做初步提醒和简短诊断，归为
          needs_context。


          3. 如果待评估 Prompt 已经包含较明确的任务意图，能够支持正式诊断、评分、问题分析和优化改写，归为 diagnosable_prompt。


          4. 如果内容有一定任务意图但不确定是否足够完整，优先归为 needs_context。


          5. 如果用户的本轮补充指令只是“开始诊断”“请开始”“帮我看看”等启动语，不要把它当作待评估 Prompt，只作为辅助信息。


          本轮补充指令：

          {{#sys.query#}}


          任务描述：

          {{#1782697678435.task_description#}}


          任务类型：

          {{#1782697678435.task_type#}}


          背景信息：

          {{#1782697678435.context#}}


          输出要求：

          {{#1782697678435.output_requirements#}}


          诊断深度：

          {{#1782697678435.review_depth#}}


          结构预检结果：

          {{#1782699841426.precheck_report#}}


          请优先根据待评估 Prompt 本身分类，其他信息只作为辅助判断。'
